# ─── Nginx reverse proxy block for MyWatchlist Hub ───────────────────────────
# Pega este bloque dentro de tu server {} en la configuración de Nginx.
# Ajusta la ruta (/watchlist/) si tu app debe servirse desde la raíz (usa / en su lugar).

location /watchlist/ {
    proxy_pass         http://mywatchlist-hub:4895/;
    proxy_http_version 1.1;

    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_cache_bypass $http_upgrade;

    # Timeouts generosos para las peticiones batch a TMDB/Jellyfin
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
}

